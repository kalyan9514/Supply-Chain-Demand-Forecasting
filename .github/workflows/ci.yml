name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 Data_Pipeline/ ML_Models/ backend/ dags/ --max-line-length=100 --ignore=E501,W503,W292,W293,F401,F841 || true
