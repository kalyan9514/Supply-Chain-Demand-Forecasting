# .github/workflows/terraform.yml
# Deploys GCP infrastructure using Terraform on every push to main.
# Three jobs: bootstrap service account, build Docker images, deploy infrastructure.

name: Deploy Infrastructure with Terraform

on:
  # push:
  #   branches: [main]
  workflow_dispatch: {}

jobs:
  bootstrap:
    name: Bootstrap Service Account
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          export_default_credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Init (bootstrap)
        working-directory: bootstrap
        run: |
          terraform init \
            -backend-config="bucket=tf-state-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=bootstrap"
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          TF_VAR_artifact_registry_name: ${{ secrets.ARTIFACT_REGISTRY_NAME }}

      - name: Terraform Apply (bootstrap)
        working-directory: bootstrap
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          TF_VAR_artifact_registry_name: ${{ secrets.ARTIFACT_REGISTRY_NAME }}

  build-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: bootstrap
    outputs:
      backend_image_uri: ${{ steps.build_backend.outputs.backend_image_uri }}
      model_training_image_uri: ${{ steps.build_model_training.outputs.model_training_image_uri }}
      model_serving_image_uri: ${{ steps.build_model_serving.outputs.model_serving_image_uri }}
      model_health_check_image_uri: ${{ steps.build_model_health_check.outputs.model_health_check_image_uri }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          export_default_credentials: true

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        id: build_backend
        run: bash scripts/build_backend.sh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          ARTIFACT_REGISTRY_NAME: ${{ secrets.ARTIFACT_REGISTRY_NAME }}
          DOCKER_IMAGE_NAME: cloudrun_backend

      - name: Build and push model training image
        id: build_model_training
        run: bash scripts/build_model_training.sh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          ARTIFACT_REGISTRY_NAME: ${{ secrets.ARTIFACT_REGISTRY_NAME }}
          DOCKER_IMAGE_NAME: model_training

      - name: Build and push model serving image
        id: build_model_serving
        run: bash scripts/build_model_serving.sh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          ARTIFACT_REGISTRY_NAME: ${{ secrets.ARTIFACT_REGISTRY_NAME }}
          DOCKER_IMAGE_NAME: model_serving

      - name: Build and push model health check image
        id: build_model_health_check
        run: bash scripts/build_model_health_check.sh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
          ARTIFACT_REGISTRY_NAME: ${{ secrets.ARTIFACT_REGISTRY_NAME }}
          DOCKER_IMAGE_NAME: cloudrun_model_health_check

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          export_default_credentials: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Init (infrastructure)
        working-directory: Infrastructure
        run: |
          terraform init \
            -backend-config="bucket=tf-state-deploy-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=infrastructure"
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Terraform Apply (infrastructure)
        working-directory: Infrastructure
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          TF_VAR_mysql_database: ${{ secrets.MYSQL_DATABASE }}
          TF_VAR_mysql_user: ${{ secrets.MYSQL_USER }}
          TF_VAR_mysql_password: ${{ secrets.MYSQL_PASSWORD }}
          TF_VAR_api_token: ${{ secrets.API_TOKEN }}
          TF_VAR_service_account_email: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}
          